name: NITT Mail Checker

on:
  schedule:
    - cron: "0/5 * * * *"    # every 5 minutes (GitHub's minimum allowed)
  workflow_dispatch:           # lets you click "Run workflow" manually anytime

jobs:
  check-mail:
    runs-on: ubuntu-latest

    # This block grants the job permission to write back to the repo
    # No settings change needed — this overrides the default at job level
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a token that allows pushing back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run NITT mail checker
        env:
          NITT_USERNAME:    ${{ secrets.NITT_USERNAME }}
          NITT_PASSWORD:    ${{ secrets.NITT_PASSWORD }}
          PUSHBULLET_TOKEN: ${{ secrets.PUSHBULLET_TOKEN }}
        run: python nitt_checker.py --preview

      - name: Commit updated seen_uids.json back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_uids.json || true
          git diff --cached --quiet || git commit -m "chore: update seen uids [skip ci]"
          git push || true
