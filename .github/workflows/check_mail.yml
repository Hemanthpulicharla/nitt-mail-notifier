name: NITT Mail Checker
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  check-mail:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run checker
        env:
          NITT_USERNAME:    ${{ secrets.NITT_USERNAME }}
          NITT_PASSWORD:    ${{ secrets.NITT_PASSWORD }}
          PUSHBULLET_TOKEN: ${{ secrets.PUSHBULLET_TOKEN }}
        run: python nitt_checker.py
      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_uids.json
          git diff --cached --quiet || git commit -m "chore: update seen uids"
          git push
