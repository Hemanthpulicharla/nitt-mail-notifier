name: NITT Mail Checker

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # manual trigger button in GitHub Actions tab

jobs:
  check-mail:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # allows this job to commit seen_uids.json back

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run mail checker
        env:
          NITT_USERNAME:    ${{ secrets.NITT_USERNAME }}
          NITT_PASSWORD:    ${{ secrets.NITT_PASSWORD }}
          PUSHBULLET_TOKEN: ${{ secrets.PUSHBULLET_TOKEN }}
        run: python nitt_checker.py

      - name: Commit seen_uids.json back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_uids.json || true
          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "chore: update seen_uids [skip ci]"
            git push
          fi
